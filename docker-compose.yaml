services:
  hautoml_worker:
    image: optivisionlab/hautoml:v2.2
    container_name: hautoml-worker
    restart: unless-stopped
    env_file:
      - ./src/backend/.env
    environment:
      HOST_BACK_END: "hautoml-toolkit"
      MINIO_ENDPOINT: "minio:9000"
    networks:
      - hautoml-network
      - kafka-network
    command: python -m cluster.worker
    logging: &default-logging
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  hautoml_toolkit:
    image: optivisionlab/hautoml:v2.2
    container_name: hautoml-toolkit
    env_file:
      - ./src/backend/.env
    environment:
      WORKER_LIST: "http://hautoml-worker:4000,"
      KAFKA_SERVER: "kafka:9092"
      MONGODB_CONNECT: "mongodb:27017"
      MINIO_ENDPOINT: "minio:9000"
      REDIRECT_URI: "http://hautoml-toolkit:9996"
      FRONTEND_URL: "http://hautoml-frontend:3000"
    ports:
      - "9996:9996"
    command: python app.py
    networks:
      - hautoml-network
      - kafka-network
    logging: *default-logging

  kafka:
    image: apache/kafka:latest
    container_name: kafka
    ports:
      - "9092:9092"
      - "9093:9093"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - kafka-network

  mongo:
    image: bitnami/mongodb:latest
    container_name: mongodb
    environment:
      MONGODB_ADVERTISED_HOSTNAME: "mongodb"
    networks:
      - hautoml-network
    ports:
      - "27017:27017"
    logging: *default-logging

  minio:
    image: quay.io/minio/minio:latest
    container_name: minio
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: abc123 # your username
      MINIO_ROOT_PASSWORD: password123 # your password
    command: server /data --console-address ":9001"
    networks:
      - hautoml-network

  hautoml_frontend:
    image: optivisionlab/hautoml-frontend:v2.2
    container_name: hautoml-frontend
    env_file:
      - ./src/frontend/.env
    ports:
      - "3000:3000"
    command: npm run dev
    logging: *default-logging

networks:
  hautoml-network:
    driver: bridge
  kafka-network:
    driver: bridge

volumes:
  kafka_data:
