services:
  hautomml_worker:
    image: optivisionlab/hautoml:v2.2
    container_name: hautoml_worker
    restart: unless-stopped
    env_file:
      - ./src/backend/.env
    environment:
      HOST_BACK_END: "0.0.0.0"
    networks:
      - hautoml-network
      - kafka-network
    command: python -m cluster.worker
    logging: &default-logging
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  hautoml_toolkit:
    image: optivisionlab/hautoml:v2.2
    container_name: hautoml_toolkit
    env_file:
      - ./src/backend/.env
    command: python app.py
    networks:
      - hautoml-network
      - kafka-network
    logging: *default-logging

  kafka:
    image: bitnami/kafka:latest
    container_name: kafka-kraft
    restart: always
    ports:
      - "9092:9092"
    environment:
      - KAFKA_CFG_NODE_ID=1
      - KAFKA_CFG_PROCESS_ROLES=controller,broker
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093,INTERNAL://:29092
      - KAFKA_CFG_ADVERTISED_LISTENERS=localhost:9092,INTERNAL://kafka:29092
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,INTERNAL:PLAINTEXT
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CFG_INTER_BROKER_LISTENER_NAME=INTERNAL
    volumes:
      - kafka_data:/bitnami/kafka
    networks:
      - kafka-network

  mongo:
    image: mongo:latest
    container_name: mongodb
    networks:
      - hautoml-network
    ports:
      - "27017:27017"
    logging: *default-logging
  
  mminio:
    image: quay.io/minio/minio:latest
    container_name: minio
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: abc123 # your username
      MINIO_ROOT_PASSWORD: password123 # your password
    command: server /data --console-address ":9001"
    networks:
      - hautoml-network

  hautoml_frontend:
    image: optivisionlab/hautoml-frontend:v2.2
    container_name: hautoml-frontend
    env_file:
      - ./src/frontend/.env
    ports:
      - "3000:3000"
    command: npm run dev
    logging: *default-logging

networks:
  hautoml-network:
    driver: bridge
  kafka-network:
    driver: bridge

volumes:
  kafka_data: