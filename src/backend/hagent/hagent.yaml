# ══════════════════════════════════════════════════════════
# HAgent — Cấu hình trung tâm (YAML)
#
# Tất cả cấu hình được tải từ file này.
# KHÔNG có giá trị nào bị hard-code trong mã nguồn.
# ══════════════════════════════════════════════════════════

# ── Cổng Gateway ─────────────────────────────────────────
gateway:
  host: "0.0.0.0"
  port: 18789

# ── Dịch vụ Bridge ───────────────────────────────────────
bridge:
  host: "0.0.0.0"
  port: 9900
  cors_origins:
    - "http://localhost:3000"
    - "http://localhost:3001"
    - "http://127.0.0.1:3000"
    - "http://localhost:8080"
    - "http://127.0.0.1:8080"

# ── HAutoML Backend ─────────────────────────────────────
hautoml:
  base_url: "http://localhost:8585"

# ── MongoDB ──────────────────────────────────────────────
mongodb:
  connect: "localhost:27017"
  db_name: "hagent"
  conversation_ttl_hours: 24

# ── Xác thực JWT (dùng chung secret với HAutoML backend) ─
auth:
  secret_key: "${SECRET_KEY}"
  algorithm: "HS256"

# ── Hook / Webhook ───────────────────────────────────────
hooks:
  enabled: true
  token: "${HAGENT_HOOKS_TOKEN}"
  path: "/hooks"

# ── Kỹ năng ──────────────────────────────────────────────
skills:
  directories:
    - "./skills"

# ── Bộ nhớ ───────────────────────────────────────────────
memory:
  enabled: true
  backend: "local"

# ── Ghi log ──────────────────────────────────────────────
logging:
  level: "info"
  file: "./logs/hagent.log"

# ── Bộ chuyển tiếp HAgent ────────────────────────────────
proxy:
  soul_path: "./SOUL.md"
  workspace_dir: "/home/node/.openclaw/workspace"
  user_context_files:
    token: "/tmp/hagent_user_token"
    user_id: "/tmp/hagent_user_id"
  error_messages:
    model_memory: "HAgent đã kết nối tới provider AI, nhưng model hiện tại không load được vì thiếu RAM. Model cần {required}, hệ thống hiện còn {available}. Hãy kiểm tra lại provider/model đang cấu hình rồi thử lại."
    model_endpoint: "HAgent đã gọi provider AI nhưng endpoint trả về trang lỗi thay vì API response. Hãy kiểm tra lại cấu hình provider/model đang sử dụng."
    gateway_connection: "HAgent Gateway đang đóng kết nối bất thường. Vui lòng thử lại sau ít phút; nếu vẫn lỗi, kiểm tra log của toolkit/openclaw_gateway."
    timeout: "HAgent xử lý quá lâu và bị timeout. Vui lòng thử lại hoặc dùng yêu cầu ngắn hơn."
    invalid_response: "HAgent chưa trả về phản hồi hợp lệ. Vui lòng thử lại sau."
    generic: "HAgent đang gặp lỗi khi xử lý yêu cầu. Chi tiết đã được ghi trong log backend."

