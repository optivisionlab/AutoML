
# ── Biến môi trường chung ────────────────────────────────
x-common-env: &common-env
  SECRET_KEY: ${SECRET_KEY}
  ALGORITHM: ${ALGORITHM:-HS256}
  ACCESS_EXPIRE: ${ACCESS_EXPIRE:-60}
  REFRESH_EXPIRE: ${REFRESH_EXPIRE:-7}
  HAGENT_HOOKS_TOKEN: ${HAGENT_HOOKS_TOKEN}
  MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
  MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}

services:
  hautoml_woker_1:
    image: ${WORKER_IMAGE:-workers:latest}
    container_name: ${WORKER_CONTAINER_NAME:-hautoml-woker-1-testing}
    profiles: ["worker"]
    restart: unless-stopped
    network_mode: host
    ports:
      - "${WORKER_PORT:-5101}:${WORKER_PORT:-5101}"
    command: uvicorn worker:app --host 0.0.0.0 --port ${WORKER_PORT:-5101}
    environment:
      - HOST=0.0.0.0
      - PORT=${WORKER_PORT:-5101}
      - WORKER_INDEX=${WORKER_INDEX:-1}
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  hautoml_nano:
    image: ${NANO_IMAGE:-hautoml-nano}
    container_name: ${NANO_CONTAINER_NAME:-hautoml_nano_v1_testing}
    profiles: ["nano"]
    restart: unless-stopped
    network_mode: host
    ports:
      - "${NANO_PORT:-5106}:${NANO_PORT:-5106}"
    expose:
      - "${NANO_PORT:-5106}"
    environment:
      - GRADIO_SERVER_NAME=0.0.0.0
      - GRADIO_SERVER_PORT=${NANO_PORT:-5106}
    command: python automl/demo_gradio.py
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  toolkit:
    build:
      context: .
      dockerfile: hautoml.toolkit.dockerfile
    image: ${TOOLKIT_IMAGE:-hautoml-toolkit}
    container_name: ${TOOLKIT_CONTAINER_NAME:-toolkit-testing}
    restart: unless-stopped
    ports:
      - "${TOOLKIT_HOST_PORT:-5370}:${TOOLKIT_PORT:-8585}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: >
      sh -c "mkdir -p /root/.openclaw/skills && rm -rf /root/.openclaw/skills/hautoml && cp -r /app/hagent/skills/hautoml /root/.openclaw/skills/hautoml && sleep 10 && python hagent/proxy.py & python app.py"
    environment:
      <<: *common-env
      HOST_BACK_END: 0.0.0.0
      PORT_BACK_END: ${TOOLKIT_PORT:-8585}
      MONGODB_CONNECT: mongo:27017
      MONGO_URI: mongodb://mongo:27017
      MONGODB_DB_NAME: ${MONGODB_DB_NAME:-hautoml}
      KAFKA_SERVER: kafka:9092
      KAFKA_TOPIC: ${KAFKA_TOPIC:-example-topic}
      MINIO_ENDPOINT: minio:9000
      HAUTOML_BASE_URL: http://localhost:${TOOLKIT_PORT:-8585}
      OPENCLAW_ALLOW_INSECURE_PRIVATE_WS: ${OPENCLAW_ALLOW_INSECURE_PRIVATE_WS:-1}
      CUSTOM_API_KEY: ${CUSTOM_API_KEY:-}
      SKIP_EMAIL_VERIFICATION: ${SKIP_EMAIL_VERIFICATION:-false}
    volumes:
      - .:/app
      - hagent_config:/root/.hagent
      - toolkit_openclaw_config:/root/.openclaw
    depends_on:
      - mongo
      - kafka
      - minio
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  kafka:
    image: ${KAFKA_IMAGE:-apache/kafka:latest}
    container_name: ${KAFKA_CONTAINER_NAME:-kafka-testing}
    restart: unless-stopped
    ports:
      - "${KAFKA_HOST_PORT:-5383}:9092"
    expose:
      - "9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  mongo:
    image: ${MONGO_IMAGE:-mongo:latest}
    container_name: ${MONGO_CONTAINER_NAME:-mongodb_hautoml_testing}
    restart: unless-stopped
    ports:
      - "${MONGO_HOST_PORT:-5380}:27017"
    expose:
      - "27017"
    volumes:
      - ${MONGO_DATA_DIR:-/data/mongodb/mongo-automl}:/data/db
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    # environment:
    #   MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME:-root}
    #   MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-example}

  minio:
    image: ${MINIO_IMAGE:-minio/minio:latest}
    container_name: ${MINIO_CONTAINER_NAME:-minio_hautoml_testing}
    restart: unless-stopped
    ports:
      - "${MINIO_HOST_PORT:-5381}:9000"
    expose:
      - "9000"
      - "9001"
    volumes:
      - minio_data:/data
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    command: server /data --console-address ":9001"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  hagent_bridge:
    image: ${HAGENT_BRIDGE_IMAGE:-hagent-bridge:latest}
    container_name: ${HAGENT_BRIDGE_CONTAINER_NAME:-hagent_bridge_testing}
    restart: unless-stopped
    ports:
      - "${HAGENT_BRIDGE_HOST_PORT:-5360}:${HAGENT_BRIDGE_PORT:-9900}"
    build:
      context: ./hagent/bridge
      dockerfile: Dockerfile
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./hagent/hagent.yaml:/tmp/hagent.yaml:ro
    environment:
      <<: *common-env
      HAGENT_CONFIG: /tmp/hagent.yaml
      MONGODB_CONNECT: mongo:27017
      HAUTOML_BASE_URL: http://toolkit:${TOOLKIT_PORT:-8585}
      HAGENT_GATEWAY_URL: http://toolkit:${OPENCLAW_PROXY_PORT:-18790}
    depends_on:
      - mongo
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  openclaw_gateway:
    image: ${OPENCLAW_IMAGE:-ghcr.io/openclaw/openclaw:latest}
    container_name: ${OPENCLAW_CONTAINER_NAME:-openclaw_gateway_testing}
    restart: unless-stopped
    ports:
      - "${OPENCLAW_HOST_PORT:-5361}:${OPENCLAW_GATEWAY_PORT:-18789}"
    command: >
      /bin/sh -c "mkdir -p /home/node/.openclaw/skills/hautoml/scripts && rm -rf /home/node/.openclaw/skills/hautoml/scripts/hautoml_tools.py && cp /tmp/hautoml_tools.py /home/node/.openclaw/skills/hautoml/scripts/hautoml_tools.py && cp /tmp/SKILL.md /home/node/.openclaw/skills/hautoml/SKILL.md && cp /tmp/tools.yaml /home/node/.openclaw/skills/hautoml/tools.yaml && rm -f /home/node/.openclaw/workspace/BOOTSTRAP.md && (while true; do python3 /tmp/proxy.py; echo 'proxy died, restarting in 3s'; sleep 3; done) & exec node dist/index.js gateway --allow-unconfigured"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./hagent/proxy.py:/tmp/proxy.py:ro
      - ./hagent/skills/hautoml/scripts/hautoml_tools.py:/tmp/hautoml_tools.py:ro
      - ./hagent/skills/hautoml/SKILL.md:/tmp/SKILL.md:ro
      - ./hagent/skills/hautoml/tools.yaml:/tmp/tools.yaml:ro
      - openclaw_config:/home/node/.openclaw
      - openclaw_workspace:/home/node/.openclaw/workspace
      - .:/home/node/.openclaw/workspace/backend
    environment:
      HAUTOML_BASE_URL: http://toolkit:${TOOLKIT_PORT:-8585}
      OPENCLAW_BUNDLED_PLUGINS_DIR: ${OPENCLAW_BUNDLED_PLUGINS_DIR:-/app/extensions}
    depends_on:
      - toolkit
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  hagent_config:
  hagent_workspace:
  minio_data:
  openclaw_config:
  openclaw_workspace:
  toolkit_openclaw_config:
