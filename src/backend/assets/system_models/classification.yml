metric_list:
  - accuracy
  - precision_macro
  - precision_weighted
  - recall_macro
  - recall_weighted
  - f1_macro
  - f1_weighted
Classification_models:
  0:
    model: DecisionTreeClassifier
    params:
      - max_depth: [5, 10, 15]
        min_samples_split: [2, 5, 10]
  1:
    model: RandomForestClassifier
    params:
      - n_estimators: [50, 100, 200]
        max_features: ["sqrt", "log2", 0.5, 1]
  2:
    model: KNeighborsClassifier
    params:
      - n_neighbors: [3, 5, 7, 9]
        weights: ["uniform", "distance"]
  3:
    model: SVC
    params:
      - kernel: ["rbf"]
        C: [0.1, 1, 10]
        gamma: ["scale", "auto"]
      - kernel: ["linear"]
        C: [0.1, 1, 10]
  4:
    model: LogisticRegression
    params:
      - solver: ["saga"]
        penalty: ["l1", "l2"]
        C: [0.001, 0.01, 0.1, 1]
        max_iter: [500, 1000]
  5:
    model: GaussianNB
    params:
      - var_smoothing: [0.000000001, 0.00000001, 0.0000001, 0.000001]
