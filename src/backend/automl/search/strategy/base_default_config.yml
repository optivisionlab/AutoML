# Cấu hình mặc định cơ sở cho tất cả Search Strategies
# File này được sử dụng khi không tìm thấy base_config.yml

# Cross-validation
cv_n_splits: 5
cv_shuffle: true
cv_random_state: 42

# Scoring
metric_sort: 'accuracy'

# Parallel processing
n_jobs: -1  # -1 = sử dụng tất cả CPU cores

# Logging
verbose: 0
log_dir: 'logs'
save_log: false

# Error handling
error_score: 'raise'

# Random state
random_state: null